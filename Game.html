<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Blast AI Edition</title>

        <!-- CSS Link -->
    <link href="CSS/Style4.CSS" rel="stylesheet">
</head>
<body>

</head>
<body>

    <!-- NAVIGATION -->
    <nav class="top-nav" aria-label="Main Navigation">
        <a href="index.html" class="nav-box">Resume</a>
        <a href="About.html" class="nav-box">About</a>
        <a href="Game.html" class="nav-box">Game</a>
    </nav>

    <!-- MAIN CONTENT WRAPPER -->
    <div class="game-wrapper">
        <h2>BLOCK BLAST</h2>
        <div class="stats">Score: <span id="score">0</span></div>

        <div id="game-container">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div id="instructions">Drag pieces into the grid to clear rows and columns!</div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    const GRID_SIZE = 8;
    const CELL_MARGIN = 4;
    let cellSize, trayY, score = 0;

    let grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(null));
    let pieces = [];
    let draggingPiece = null;
    let dragOffset = { x: 0, y: 0 };

    const SHAPES = [
        { color: '#FF5555', cells: [[0,0], [1,0], [0,1], [1,1]] }, 
        { color: '#55FF55', cells: [[0,0], [0,1], [0,2]] },       
        { color: '#5555FF', cells: [[0,0], [1,0], [2,0]] },       
        { color: '#FFFF55', cells: [[0,0]] },                     
        { color: '#FF55FF', cells: [[0,0], [1,0], [1,1]] },       
        { color: '#55FFFF', cells: [[0,0], [1,0], [2,0], [2,1], [2,2]] } 
    ];

    function init() {
        resize();
        generatePieces();
        animate();
    }

    function resize() {
        const size = Math.min(window.innerWidth - 40, 400);
        canvas.width = size;
        canvas.height = size * 1.4; 
        cellSize = (canvas.width - (CELL_MARGIN * (GRID_SIZE + 1))) / GRID_SIZE;
        trayY = canvas.width + 20;
    }

    function generatePieces() {
        pieces = [];
        for (let i = 0; i < 3; i++) {
            const shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
            pieces.push({
                ...shape,
                x: (canvas.width / 3) * i + 20,
                y: trayY,
                origX: (canvas.width / 3) * i + 20,
                origY: trayY,
                scale: 0.6 
            });
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                ctx.fillStyle = grid[r][c] || '#2a2a2a';
                drawRoundedRect(c * (cellSize + CELL_MARGIN) + CELL_MARGIN, r * (cellSize + CELL_MARGIN) + CELL_MARGIN, cellSize, cellSize, 5);
            }
        }
        pieces.forEach(p => {
            if (p === draggingPiece) return;
            ctx.fillStyle = p.color;
            p.cells.forEach(([dx, dy]) => {
                drawRoundedRect(p.x + dx * (cellSize * p.scale), p.y + dy * (cellSize * p.scale), cellSize * p.scale, cellSize * p.scale, 3);
            });
        });
        if (draggingPiece) {
            ctx.fillStyle = draggingPiece.color;
            ctx.globalAlpha = 0.8;
            draggingPiece.cells.forEach(([dx, dy]) => {
                drawRoundedRect(draggingPiece.x + dx * cellSize, draggingPiece.y + dy * cellSize, cellSize, cellSize, 5);
            });
            ctx.globalAlpha = 1.0;
        }
    }

    function drawRoundedRect(x, y, w, h, r) {
        ctx.beginPath();
        if(ctx.roundRect) {
            ctx.roundRect(x, y, w, h, r);
        } else {
            ctx.rect(x, y, w, h); // Fallback
        }
        ctx.fill();
    }

    canvas.addEventListener('mousedown', startDrag);
    canvas.addEventListener('mousemove', drag);
    window.addEventListener('mouseup', endDrag);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrag(e.touches[0]); }, {passive: false});
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); drag(e.touches[0]); }, {passive: false});
    window.addEventListener('touchend', (e) => endDrag(e.changedTouches[0]));

    function startDrag(e) {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        pieces.forEach((p, index) => {
            if (mouseY > trayY - 50 && mouseX > p.x && mouseX < p.x + 100) {
                draggingPiece = p;
                draggingPiece.index = index;
                dragOffset.x = mouseX - p.x;
                dragOffset.y = mouseY - p.y;
            }
        });
    }

    function drag(e) {
        if (!draggingPiece) return;
        const rect = canvas.getBoundingClientRect();
        draggingPiece.x = (e.clientX - rect.left) - dragOffset.x;
        draggingPiece.y = (e.clientY - rect.top) - dragOffset.y;
    }

    function endDrag() {
        if (!draggingPiece) return;
        const gridX = Math.round((draggingPiece.x - CELL_MARGIN) / (cellSize + CELL_MARGIN));
        const gridY = Math.round((draggingPiece.y - CELL_MARGIN) / (cellSize + CELL_MARGIN));
        if (canPlace(draggingPiece, gridX, gridY)) {
            placePiece(draggingPiece, gridX, gridY);
            pieces.splice(draggingPiece.index, 1);
            if (pieces.length === 0) generatePieces();
            checkLines();
        } else {
            draggingPiece.x = draggingPiece.origX;
            draggingPiece.y = draggingPiece.origY;
        }
        draggingPiece = null;
    }

    function canPlace(piece, startCol, startRow) {
        return piece.cells.every(([dx, dy]) => {
            const r = startRow + dy;
            const c = startCol + dx;
            return r >= 0 && r < GRID_SIZE && c >= 0 && c < GRID_SIZE && !grid[r][c];
        });
    }

    function placePiece(piece, startCol, startRow) {
        piece.cells.forEach(([dx, dy]) => {
            grid[startRow + dy][startCol + dx] = piece.color;
        });
        score += piece.cells.length * 10;
        scoreEl.innerText = score;
    }

    function checkLines() {
        let rowsToClear = [];
        let colsToClear = [];
        for (let i = 0; i < GRID_SIZE; i++) {
            if (grid[i].every(cell => cell !== null)) rowsToClear.push(i);
            if (grid.every(row => row[i] !== null)) colsToClear.push(i);
        }
        rowsToClear.forEach(r => grid[r] = Array(GRID_SIZE).fill(null));
        colsToClear.forEach(c => {
            for (let r = 0; r < GRID_SIZE; r++) grid[r][c] = null;
        });
        if (rowsToClear.length > 0 || colsToClear.length > 0) {
            score += (rowsToClear.length + colsToClear.length) * 100;
            scoreEl.innerText = score;
        }
    }

    function animate() {
        draw();
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    init();
</script>
</body>
</html>
